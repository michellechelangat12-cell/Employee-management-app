<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="new-contact.html">New Contacts</a></li>
            <li><a href="view-contact.html">View Contacts</a></li>
        </ul>
   </nav>
   <div class="container">
    <h1>Add new contact</h1>
    <form action="submit_contact.php" method="post">
        <label for ="id">ID:</label>
        <input type="text" id="id" name="id" placeholder="Enter Identification Number"><br><br>
        <label for="Fname">Firstname:</label>
        <input type="text" id="Fname" name="Fname" placeholder="Enter Firstname" ><br><br>
        <label for="Lname">Lastname:</label>
        <input type="text" id="Lname" name="Lname" placeholder="Enter Lastname" ><br><br>
        <label for ="gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br><br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" placeholder="+2547--------"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter Email" ><br><br>
        <label for="address">Address:</label>
        <input type="text" id="address" name="address" placeholder="Enter Address"><br><br>
        <label for="date of birth">Date of Birth:</label>
        <input type="date" id="date of birth" name="date of birth"><br><br>
        <label for="position">Position:</label>
        <select id="position" name="position" >
            <option value="">--Select Position if Official--</option>
            <option value="manager">Manager</option>
            <option value="developer">Developer</option>
            <option value="designer">Designer</option>
            <option value="tester">Tester</option>
        </select><br><br>
        <input type="submit" value="Add Contact">
    </form>
   
</body>
</html>
